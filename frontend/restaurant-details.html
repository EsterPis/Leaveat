<!doctype html>
<html lang="it">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Leaveat • Dettagli Ristorante</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <!--Dynamic navbar-->
    <!-- ================= CONTENUTO ================= -->
    <main class="container py-4">
        <!-- Sezione info ristorante -->
        <div id="restaurantInfo" class="mb-5"></div>
        <hr>
        <!-- Sezione menu -->
        <h3 class="mb-3">Menu</h3>
        <div class="card mb-4">
            <div class="card-body">
                <div class="row g-3">
                    <!-- Nome -->
                    <div class="col-md-3">
                        <input type="text" id="filterName" class="form-control" placeholder="Nome piatto">
                    </div>
                    <!-- Categoria -->
                    <div class="col-md-3">
                        <select id="filterCategory" class="form-select">
                            <option value="">Tutte le categorie</option>
                        </select>
                    </div>
                    <!-- Prezzo max -->
                    <div class="col-md-3">
                        <input type="number" id="filterPrice" class="form-control" placeholder="Prezzo massimo">
                    </div>
                    <!-- Ingredienti -->
                    <div class="col-md-3">
                        <input type="text" id="filterIngredients" class="form-control" placeholder="Ingrediente">
                    </div>
                </div>
            </div>
        </div>
        <div id="menuContainer" class="row g-3"></div>
    </main>

    <script>
        let currentDishes = [];
        let currentDishIds = [];
        let restaurantId = null;

        // init page
        function initPage() {
            restaurantId = getRestaurantId(); // Ottieni l'ID del ristorante dai parametri URL
            if (!restaurantId) {
                alert("Ristorante non valido.");
                return;
            }
            loadRestaurantData(); // Carica i dati del ristorante e i piatti 
            updateCartBadge(); // Aggiorna il badge del carrello all'avvio della pagina
        }

        // caricamento dati ristorante e menù
        async function loadRestaurantData() {
            try {
                const response = await fetch(`/api/lv/restaurants/${restaurantId}`);
                const result = await response.json();

                if (!result.success) throw new Error(result.message);

                const restaurant = result.data;
                renderRestaurantInfo(restaurant); // Mostra le informazioni del ristorante

                const dishes = restaurant.menuId?.dishIds || [];
                currentDishIds = dishes.map(d => d._id);

                await loadInitialDishes();
            } catch (err) {
                console.error("Errore caricamento ristorante:", err);
                alert("Errore nel caricamento del ristorante.");
            }
        }

        // caricamento iniziale dei piatti (senza filtri)
        async function loadInitialDishes() {
            try {
                const query = `dishIds=${currentDishIds.join(',')}`;
                console.log("LOAD INIT:", `/api/lv/dishes?${query}`);

                const response = await fetch(`/api/lv/dishes?${query}`);
                const result = await response.json();

                if (!result.success) throw new Error(result.message);

                currentDishes = result.data;

                renderMenu(result.data);
                initFilters(result.data);

            } catch (err) {
                console.error("Errore caricamento iniziale piatti:", err);
            }
        }


        // =============================
        // UTILS
        // =============================
        // Estrae l'ID del ristorante dai parametri URL
        function getRestaurantId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }


        // =============================
        // RENDER
        // =============================
        function renderRestaurantInfo(r) {

            const container = document.getElementById('restaurantInfo');

            const name = r.displayName || r.legalName || "Ristorante";

            const address = r.address
                ? `${r.address.street} ${r.address.number}, ${r.address.city} (${r.address.province})`
                : "Indirizzo non disponibile";

            const imageSrc = (r.imageUrl && r.imageUrl.trim() !== "")
                ? r.imageUrl
                : "/assets/banner.png";

            container.innerHTML = `
        <div class="card shadow-sm">
            <img src="${imageSrc}"
                 onerror="this.src='/assets/logo-default.png'"
                 class="card-img-top"
                 style="height:250px; object-fit:cover;">

            <div class="card-body">
                <h2>${name}</h2>
                <p class="text-muted">${address}</p>
                <p><strong>Telefono:</strong> ${r.phoneNumber || "Non disponibile"}</p>
                <p><strong>Email:</strong> ${r.email || "Non disponibile"}</p>
            </div>
        </div>
    `;
        }


        function renderMenu(dishes) {
            const container = document.getElementById('menuContainer');
            container.innerHTML = '';

            if (!dishes.length) {
                container.innerHTML = `
            <div class="col-12">
                <div class="alert alert-info">Nessun piatto disponibile.</div>
            </div>
        `;
                return;
            }

            dishes.forEach(d => container.appendChild(createDishCard(d)));
        }


        function createDishCard(d) {
            const col = document.createElement('div');
            col.className = 'col-12 col-md-6 col-lg-4';

            const imageSrc = (d.image && d.image.trim() !== "")
                ? d.image
                : "/assets/logo-default.png";

            col.innerHTML = `
            <div class="card h-100 shadow-sm">

                <a href="/dish-details.html?id=${d._id}">
                    <img src="${imageSrc}"
                        onerror="this.src='/assets/logo-default.jpg'"
                        class="card-img-top"
                        style="height:200px; object-fit:cover;">
                </a>

                <div class="card-body d-flex flex-column">
                    <h5>
                        <a href="/dish-details.html?id=${d._id}" class="text-decoration-none text-dark">
                            ${d.name}
                        </a>
                    </h5>

                    <p class="small text-muted">${d.category || ""}</p>

                    <p>€ ${Number(d.price).toFixed(2)}</p>

                    <button class="btn btn-primary btn-sm mt-auto"
                            onclick="addToCart('${d._id}')">
                        Aggiungi al carrello
                    </button>
                </div>
            </div>
            `;

            return col;
        }


        // =============================
        // FILTERS
        // =============================
        function initFilters(dishes) {
            populateCategoryFilter(dishes);
            attachFilterEvents();
        }


        function populateCategoryFilter(dishes) {
            const select = document.getElementById('filterCategory');
            const categories = [...new Set(dishes.map(d => d.category).filter(Boolean))];

            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.textContent = cat;
                select.appendChild(option);
            });
        }


        function attachFilterEvents() {
            document.getElementById('filterName').addEventListener('input', applyFilters);
            document.getElementById('filterCategory').addEventListener('change', applyFilters);
            document.getElementById('filterPrice').addEventListener('input', applyFilters);
            document.getElementById('filterIngredients').addEventListener('input', applyFilters);
        }

        function buildQueryParams(filters) {
            const params = new URLSearchParams();

            if (filters.name) params.append('name', filters.name);
            if (filters.category) params.append('category', filters.category);
            if (!isNaN(filters.maxPrice)) params.append('maxPrice', filters.maxPrice);
            if (filters.ingredient) params.append('ingredient', filters.ingredient);
            if (currentDishIds.length) {
                params.append('dishIds', currentDishIds.join(','));
            }

            return params.toString();
        }


        async function applyFilters() {
            const filters = getFilterValues();
            const query = buildQueryParams(filters);
            console.log("CHIAMO API:", `/api/lv/dishes?${query}`)

            try {
                const response = await fetch(`/api/lv/dishes?${query}`);
                console.log("RISPOSTA FETCH:", response);
                const result = await response.json();

                if (!result.success) throw new Error(result.message);

                currentDishes = result.data;
                renderMenu(result.data);

            } catch (err) {
                console.error("Errore filtro piatti:", err);
            }
        }


        function getFilterValues() {
            return {
                name: document.getElementById('filterName').value.toLowerCase(),
                category: document.getElementById('filterCategory').value,
                maxPrice: parseFloat(document.getElementById('filterPrice').value),
                ingredient: document.getElementById('filterIngredients').value.toLowerCase()
            };
        }

        // =============================
        // CART
        // =============================
        function getCart() {
            return JSON.parse(localStorage.getItem("cart")) || null;
        }

        function saveCart(cart) {
            localStorage.setItem("cart", JSON.stringify(cart));
            updateCartBadge();
        }

        function updateCartBadge() {
            const badge = document.getElementById("cart-count");
            const cart = getCart();

            if (!badge) return;

            if (!cart || !cart.items.length) {
                badge.textContent = 0;
                return;
            }

            const totalItems = cart.items.reduce((sum, item) => sum + item.quantity, 0);
            badge.textContent = totalItems;
        }


        function addToCart(dishId) {

            const cart = getCart();
            const dish = currentDishes.find(d => d._id === dishId);

            if (!dish) return;

            if (cart && cart.restaurantId !== restaurantId) {
                if (!confirm("Hai già piatti di un altro ristorante. Vuoi svuotare il carrello?")) return;
                localStorage.removeItem("cart");
            }

            const newCart = getCart() || {
                restaurantId: restaurantId,
                items: []
            };

            const existingItem = newCart.items.find(i => i.dishId === dishId);

            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                newCart.items.push({
                    dishId: dish._id,
                    name: dish.name,
                    price: dish.price,
                    quantity: 1
                });
            }

            saveCart(newCart);
        }


        // =============================
        // START
        // =============================
        initPage();

    </script>
    <script type="module"> import { renderNavbar } from '/js/utils/navbar.js'; renderNavbar() </script>
    <script src="/js/session.js"></script>

</body>

</html>
