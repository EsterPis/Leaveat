<!doctype html>
<html lang="it">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Leaveat • Home</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>
  <!--Dynamic navbar-->
  <!-- ================= HEADER ================= -->
  <header class="bg-light py-5">
    <div class="container">
      <h1 class="display-6">Benvenuto su Leaveat</h1>
      <p class="lead">Scopri i ristoranti disponibili</p>

      <!-- Ricerca ristorante -->
      <form id="searchForm" class="row g-2">
        <div class="col-md-5">
          <input class="form-control" name="name" placeholder="Cerca per nome ristorante">
        </div>
        <div class="col-md-5">
          <input class="form-control" name="city" placeholder="Cerca per città">
        </div>
        <div class="col-md-2">
          <button class="btn btn-primary w-100">Cerca</button>
        </div>
      </form>

      <div id="noResults" class="text-center text-muted mt-3" style="display:none;">
        Nessun ristorante trovato
      </div>
  </header>

  <!-- ================= RISULTATI ================= -->
  <main class="container py-4">
    <!-- Sezioni personalizzate (solo CUSTOMER) -->
    <div id="personalized-home"></div>
    <div id="results" class="row g-3"></div>
  </main>

  <!-- ================= SCRIPT ================= -->
  <script>
    const form = document.getElementById('searchForm');
    const results = document.getElementById('results');
    const noResults = document.getElementById('noResults');

    // ----------------------------------------------------
    // Carica ristoranti dal backend
    // ----------------------------------------------------
    async function fetchRestaurants(params = {}) {
      try {
        const queryString = new URLSearchParams(params).toString();
        const response = await fetch('/api/lv/restaurants?' + queryString);
        const data = await response.json();

        results.innerHTML = '';
        const restaurants = data.data || [];

        if (restaurants.length === 0) {
          noResults.style.display = 'block';
          return;
        }

        noResults.style.display = 'none';

        restaurants.forEach(r => {

          // Nome corretto dal tuo schema
          const name = r.displayName || r.legalName || "Ristorante";

          // Indirizzo strutturato
          const address = r.address
            ? `${r.address.street} ${r.address.number}, ${r.address.city} (${r.address.province})`
            : "Indirizzo non disponibile";

          // Fallback immagine
          const imageSrc = (r.imageUrl && r.imageUrl.trim() !== "")
            ? r.imageUrl
            : "/assets/logo-default.png";

          const col = document.createElement('div');
          col.className = 'col-12 col-md-6 col-lg-4';

          col.innerHTML = `
        <div class="card h-100 shadow-sm">

          <img src="${imageSrc}"
               onerror="this.src='/assets/logo-default.png'"
               class="card-img-top"
               alt="${name}"
               style="height:200px; object-fit:cover;">

          <div class="card-body d-flex flex-column">
            <h5 class="card-title">${name}</h5>

            <p class="card-text small text-muted mb-3">
              ${address}<br>
              ${r.phoneNumber || "Telefono non disponibile"}
            </p>

            <a href="/restaurant-details.html?id=${r._id}"
               class="btn btn-outline-primary btn-sm mt-auto">
               Visualizza menu
            </a>
          </div>
        </div>
      `;

          results.appendChild(col);
        });

      } catch (error) {
        console.error("Errore nel caricamento dei ristoranti:", error);
      }
    }

    // ----------------------------------------------------
    // Evento ricerca
    // ----------------------------------------------------
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const formData = Object.fromEntries(new FormData(form).entries());
      fetchRestaurants(formData);
    });

    form.addEventListener('input', () => {
      const formData = Object.fromEntries(new FormData(form).entries());

      // Se entrambi vuoti → ricarica tutto
      if (!formData.name && !formData.city) {
        fetchRestaurants({});
      }
    });

    form.addEventListener('submit', (e) => {
      e.preventDefault();

      let formData = Object.fromEntries(new FormData(form).entries());

      // Rimuove campi vuoti
      Object.keys(formData).forEach(key => {
        if (!formData[key]) delete formData[key];
      });

      fetchRestaurants(formData);
    });

    // ----------------------------------------------------
    // Caricamento iniziale
    // ----------------------------------------------------
    fetchRestaurants({});
  </script>
  <script type="module">
    import { renderNavbar } from '/js/utils/navbar.js';
    renderNavbar();
  </script>
  <script src="/js/session.js"></script>
  <script src="/js/index.js"></script> <!-- Dopo session perchè ha bisogno di verificare se l'utnete è loggato-->

</body>

</html>
