<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Leaveat • Home</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/">Leaveat</a>
    <div class="ms-auto d-flex gap-2">
      <a class="btn btn-outline-light btn-sm" href="/login.html">Login</a>
      <a class="btn btn-warning btn-sm" href="/register.html">Registrati</a>
    </div>
  </div>
</nav>

<header class="bg-light py-5">
  <div class="container">
    <h1 class="display-6">Benvenuto su Leaveat</h1>
    <p class="lead">We leave it you eat it.</p>
    <form id="searchForm" class="row g-2">
      <div class="col-sm-4"><input class="form-control" name="name" placeholder="Nome piatto"></div>
      <div class="col-sm-3"><input class="form-control" name="category" placeholder="Categoria"></div>
      <div class="col-sm-3"><input class="form-control" name="maxPrice" type="number" min="0" placeholder="Prezzo max"></div>
      <div class="col-sm-2"><button class="btn btn-primary w-100">Cerca</button></div>
    </form>
  </div>
</header>

<main class="container py-4">
  <div id="results" class="row g-3"></div>
</main>

<script>
const form = document.getElementById('searchForm');
const results = document.getElementById('results');

async function fetchDishes(params = {}) {
  const qs = new URLSearchParams(params).toString();
  const res = await fetch('/api/dishes?' + qs);
  const out = await res.json();
  results.innerHTML = '';
  (out.data || []).forEach(d => {
    const col = document.createElement('div');
    col.className = 'col-12 col-sm-6 col-lg-4';
    col.innerHTML = `
      <div class="card h-100">
        ${d.image ? `<img src="${d.image}" class="card-img-top" alt="${d.name}">` : ''}
        <div class="card-body">
          <h5 class="card-title">${d.name}</h5>
          <p class="card-text small text-muted">${d.category || ''} ${d.area ? '• ' + d.area : ''}</p>
          <span class="badge text-bg-success">€ ${Number(d.price).toFixed(2)}</span>
        </div>
      </div>`;
    results.appendChild(col);
  });
}

form.addEventListener('submit', (e) => {
  e.preventDefault();
  const data = Object.fromEntries(new FormData(form).entries());
  fetchDishes(data);
});

// initial load
fetchDishes({});
</script>
<script src="/frontend/js/session.js"></script>
</body>
</html>
