<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Ristoratore - Leaveat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .restaurant-card {
            transition: transform 0.2s;
            border-left: 5px solid #0d6efd; /* Bordo colorato a sinistra */
        }
        .restaurant-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Leaveat Business</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav align-items-center">
                    <li class="nav-item">
                        <span class="nav-link active" id="welcome-msg">Benvenuto</span>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="./account.html" title="Il mio Profilo">
                            <i class="fas fa-user-circle fa-2x"></i>
                        </a>
                    </li>
                    <li class="nav-item ms-3">
                        <button class="btn btn-outline-light btn-sm" id="logout-btn">Logout</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>I tuoi Ristoranti</h2>
            <a href="create-restaurant.html" class="btn btn-success">
                <i class="fas fa-plus"></i> Nuovo Ristorante
            </a>
        </div>

        <div class="row" id="restaurants-container">
            <div class="text-center">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Caricamento...</span>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/restaurateur-dashboard.js"></script>
</body>
</html>
