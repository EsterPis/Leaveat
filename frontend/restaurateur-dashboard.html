<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Ristoratore - Leaveat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .restaurant-card {
            transition: transform 0.2s;
            border-left: 5px solid #0d6efd;
            /* Bordo colorato a sinistra */
        }

        .restaurant-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body class="bg-light">

    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>I tuoi Ristoranti</h2>
            <a href="create-restaurant.html" class="btn btn-success">
                <i class="fas fa-plus"></i> Nuovo Ristorante
            </a>
        </div>

        <div class="row" id="restaurants-container">
            <div class="text-center">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Caricamento...</span>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module"> import { renderNavbar } from '/js/utils/navbar.js'; renderNavbar() </script>
    <script src="/js/session.js"></script>
    <script src="../js/restaurateur-dashboard.js"></script>
</body>

</html>
