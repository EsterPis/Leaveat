<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Ristorante - Leaveat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="restaurateur-dashboard.html">
                <i class="fas fa-arrow-left"></i> Torna alla Dashboard
            </a>
            <span class="navbar-text text-white fw-bold" id="nav-restaurant-name">
                Caricamento...
            </span>
        </div>
    </nav>

    <div class="container">

        <ul class="nav nav-tabs mb-4" id="myTab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="info-tab" data-bs-toggle="tab" data-bs-target="#info-pane"
                    type="button">
                    <i class="fas fa-info-circle"></i> Info Ristorante
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="menu-tab" data-bs-toggle="tab" data-bs-target="#menu-pane" type="button">
                    <i class="fas fa-utensils"></i> Menù
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="orders-tab" data-bs-toggle="tab" data-bs-target="#orders-pane"
                    type="button">
                    <i class="fas fa-receipt"></i> Gestione Ordini <span class="badge bg-danger"
                        id="pending-badge">0</span>
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="stats-tab" data-bs-toggle="tab" data-bs-target="#stats-pane" type="button">
                    <i class="fas fa-chart-bar"></i> Statistiche
                </button>
            </li>
        </ul>

        <div class="tab-content" id="myTabContent">

            <div class="tab-pane fade show active" id="info-pane" role="tabpanel">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h4 class="card-title">Dettagli Ristorante</h4>
                            <button class="btn btn-outline-primary" id="btn-edit-info">
                                <i class="fas fa-edit"></i> Modifica Dati
                            </button>
                        </div>
                        <div class="row" id="info-content">
                            <p class="text-muted">Caricamento dati...</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="menu-pane" role="tabpanel">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4>Piatti nel Menù</h4>
                    <div>
                        <button class="btn btn-success me-2" id="btn-add-dish">
                            <i class="fas fa-plus"></i> Aggiungi Piatto
                        </button>
                        <button class="btn btn-outline-secondary" id="btn-edit-menu">
                            <i class="fas fa-edit"></i> Modifica Menù
                        </button>
                    </div>
                </div>
                <div class="table-responsive bg-white shadow-sm rounded p-3">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Categoria</th>
                                <th>Prezzo</th>
                                <th>Azioni</th>
                            </tr>
                        </thead>
                        <tbody id="menu-table-body">
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="tab-pane fade" id="orders-pane" role="tabpanel">
                <div class="row">
                    <div class="col-12 mb-3">
                        <button class="btn btn-primary btn-sm" onclick="loadOrders()">
                            <i class="fas fa-sync"></i> Aggiorna Ordini
                        </button>
                    </div>
                    <div class="col-12" id="orders-container">
                        <div class="alert alert-info">Nessun ordine attivo al momento.</div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="stats-pane" role="tabpanel">
                <div class="alert alert-warning">
                    <i class="fas fa-tools"></i> Sezione Statistiche in costruzione...
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="addDishModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Gestione Menù</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">

                    <ul class="nav nav-tabs mb-3" id="dishTab" role="tablist">
                        <li class="nav-item">
                            <button class="nav-link active" id="catalog-tab" data-bs-toggle="tab"
                                data-bs-target="#catalog-pane" type="button">Dal Catalogo</button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" id="custom-tab" data-bs-toggle="tab" data-bs-target="#custom-pane"
                                type="button">Nuovo Piatto</button>
                        </li>
                    </ul>

                    <div class="tab-content">
                        <div class="tab-pane fade show active" id="catalog-pane">
                            <div class="input-group mb-3">
                                <input type="text" id="catalog-search-input" class="form-control"
                                    placeholder="Cerca (es. Carbonara)...">
                                <button class="btn btn-primary" id="btn-search-catalog">Cerca</button>
                            </div>
                            <div id="catalog-results" class="list-group overflow-auto" style="max-height: 300px;">
                                <p class="text-center text-muted">Cerca un piatto per aggiungerlo al tuo menù.</p>
                            </div>
                        </div>

                        <div class="tab-pane fade" id="custom-pane">
                            <form id="add-dish-form">
                                <div class="mb-3">
                                    <label class="form-label">Nome</label>
                                    <input type="text" class="form-control" id="dish-name" required>
                                </div>
                                <div class="row">
                                    <div class="col-6 mb-3">
                                        <label class="form-label">Prezzo (€)</label>
                                        <input type="number" step="0.01" class="form-control" id="dish-price" required>
                                    </div>
                                    <div class="col-6 mb-3">
                                        <label class="form-label">Categoria</label>
                                        <select class="form-select" id="dish-category" required>
                                            <option value="" selected disabled>Seleziona...</option>
                                            <option value="STARTER">Starter</option>
                                            <option value="PASTA">Pasta</option>
                                            <option value="BEEF">Beef</option>
                                            <option value="CHICKEN">Chicken</option>
                                            <option value="PORK">Pork</option>
                                            <option value="SEAFOOD">Seafood</option>
                                            <option value="VEGETARIAN">Vegetarian</option>
                                            <option value="DESSERT">Dessert</option>
                                            <option value="SIDE">Side</option>
                                            <option value="MISCELLANEOUS">Miscellaneous</option>
                                            <option value="BREAKFAST">Breakfast</option>
                                            <option value="GOAT">Goat</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Ingredienti (separati da virgola)</label>
                                    <input type="text" class="form-control" id="dish-ingredients" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Descrizione</label>
                                    <textarea class="form-control" id="dish-description" rows="2"></textarea>
                                </div>
                                <button type="submit" class="btn btn-success w-100">Crea Piatto Personalizzato</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/restaurant-manage.js"></script>
</body>

</html>
