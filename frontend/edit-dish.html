<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifica Piatto - Leaveat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="restaurateur-dashboard.html">Leaveat Business</a>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="mb-4" id="dish-title">Modifica Piatto</h2>
        <div class="card shadow-sm">
            <div class="card-body">
                <div id="loading-spinner" class="text-center p-5">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-2">Caricamento piatto...</p>
                </div>

                <form id="edit-dish-form" style="display:none;">

                    <div class="mb-3">
                        <label for="dish-name" class="form-label">Nome Piatto *</label>
                        <input type="text" class="form-control" id="dish-name" required>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="dish-price" class="form-label">Prezzo (€) *</label>
                            <input type="number" step="0.01" min="0.01" class="form-control" id="dish-price" required>
                        </div>

                        <div class="col-md-4 mb-3">
                            <label for="dish-preptime" class="form-label">Tempo di preparazione (minuti)</label>
                            <input type="number" min="1" class="form-control" id="dish-preptime" placeholder="Es. 15">
                        </div>

                        <div class="col-md-4 mb-3">
                            <label for="dish-category" class="form-label">Categoria *</label>
                            <select class="form-select" id="dish-category" required>
                                <option value="" selected disabled>Caricamento categorie...</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="dish-description" class="form-label">Descrizione</label>
                        <textarea class="form-control" id="dish-description" rows="3"></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="dish-ingredients" class="form-label">Ingredienti *</label>
                        <input type="text" class="form-control" id="dish-ingredients" required>
                        <small class="form-text text-muted">Separare gli ingredienti con una virgola e uno spazio (es.
                            A, B, C).</small>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                        <button type="button" id="btn-cancel" class="btn btn-secondary"><i
                                class="fas fa-arrow-left"></i> Annulla e Torna</button>
                        <button type="submit" class="btn btn-warning"><i class="fas fa-save"></i> Salva Modifiche
                            Piatto</button>
                    </div>
                </form>

                <div id="error-message" class="alert alert-danger mt-3" style="display:none;"></div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/edit-dish.js"></script>
</body>

</html>
