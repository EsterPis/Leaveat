<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Leaveat • I miei ordini</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/index.html">Leaveat</a>

    <div class="d-flex align-items-center gap-3">
      <a href="/cart.html" class="btn btn-outline-light position-relative">
        <i class="bi bi-cart3"></i>
        <span id="cart-count"
              class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
          0
        </span>
      </a>

      <div class="user-section"></div>
    </div>
  </div>
</nav>

<main class="container py-4">

  <h2 class="mb-4">I miei ordini</h2>

  <div id="ordersContainer"></div>

</main>

<script>

// ================= CARRELLO BADGE =================
function updateCartBadge() {
  const badge = document.getElementById("cart-count");
  const cart = JSON.parse(localStorage.getItem("cart")) || null;

  if (!badge) return;

  if (!cart || !cart.items.length) {
    badge.textContent = 0;
    return;
  }

  const totalItems = cart.items.reduce((sum, item) => sum + item.quantity, 0);
  badge.textContent = totalItems;
}

// ================= CARICA ORDINI =================
async function loadOrders() {

  const token = localStorage.getItem("token");
  const role = localStorage.getItem("role");

  if (!token) {
    alert("Devi effettuare il login.");
    window.location.href = "/login.html";
    return;
  }

  if (role !== "CUSTOMER") {
    alert("Solo i clienti possono visualizzare gli ordini.");
    return;
  }

  try {

    const response = await fetch("/api/lv/orders/my-orders", {
      headers: {
        "Authorization": "Bearer " + token
      }
    });

    const result = await response.json();

    if (!response.ok) {
      throw new Error(result.message);
    }

    renderOrders(result.data);

  } catch (err) {
    console.error(err);
    alert("Errore nel caricamento degli ordini.");
  }
}

// ================= RENDER ORDINI =================
function renderOrders(orders) {

  const container = document.getElementById("ordersContainer");
  container.innerHTML = "";

  if (!orders.length) {
    container.innerHTML = `
      <div class="alert alert-info">
        Non hai ancora effettuato ordini.
      </div>
    `;
    return;
  }

  orders.forEach(order => {

    const card = document.createElement("div");
    card.className = "card mb-4";

    const itemsList = order.items.map(item =>
      `<li>${item.quantity} × ${item.dishId.name}</li>`
    ).join("");

    card.innerHTML = `
      <div class="card-body">

        <div class="d-flex justify-content-between">
          <h5>Ordine #${order._id}</h5>
          <span class="badge bg-primary">${order.status}</span>
        </div>

        <p class="text-muted">
          ${new Date(order.createdAt).toLocaleString()}
        </p>

        <ul>
          ${itemsList}
        </ul>

        <h6 class="mt-3">
          Totale: € ${order.totalPrice.toFixed(2)}
        </h6>

        ${
          order.status === "ORDINATO"
            ? `<button class="btn btn-sm btn-outline-danger mt-2"
                       onclick="cancelOrder('${order._id}')">
                 Annulla ordine
               </button>`
            : ""
        }

      </div>
    `;

    container.appendChild(card);
  });
}

// ================= ANNULLAMENTO =================
async function cancelOrder(orderId) {

  const token = localStorage.getItem("token");

  if (!confirm("Vuoi annullare l'ordine?")) return;

  try {

    const response = await fetch(`/api/lv/orders/${orderId}/cancel`, {
      method: "PATCH",
      headers: {
        "Authorization": "Bearer " + token
      }
    });

    if (!response.ok) {
      throw new Error("Errore annullamento");
    }

    loadOrders();

  } catch (err) {
    console.error(err);
    alert("Errore durante l'annullamento.");
  }
}

// ================= INIT =================
updateCartBadge();
loadOrders();

</script>

<script src="/js/session.js"></script>

</body>
</html>
