<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Nuovo Ristorante - Leaveat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <div class="container py-5" style="max-width: 800px;">
        <div id="restaurant-wizard-mount"></div>
    </div>

    <div class="modal fade" id="cloneMenuModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Copia Menù</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <label class="form-label">Seleziona il ristorante sorgente:</label>
                    <select id="select-source-res" class="form-select mb-3">
                        <option value="">Scegli...</option>
                    </select>
                    
                    <div id="preview-menu-container" class="border rounded p-3 bg-light" style="max-height: 300px; overflow-y: auto; display: none;">
                        <h6>Anteprima piatti:</h6>
                        <ul id="preview-list" class="list-group list-group-flush"></ul>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" id="btn-confirm-clone" disabled>Conferma e Copia</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initRestaurantWizard } from './js/restaurant-wizard-logic.js';
        
        // Verifica token
        if(!localStorage.getItem('token')) window.location.href = 'login.html';

        // Avvia Scenario B (true)
        initRestaurantWizard('restaurant-wizard-mount', true);
    </script>
</body>
</html>
