<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifica Ristorante - Leaveat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary" style="background-color: #ee1d23 !important;">
        <div class="container-fluid">
            <a class="navbar-brand" href="restaurateur-dashboard.html">Leaveat Business</a>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="mb-4">Modifica Dati Ristorante</h2>
        <div class="card shadow-sm">
            <div class="card-body">
                <div id="loading-spinner" class="text-center p-5">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-2">Caricamento dati...</p>
                </div>

                <form id="edit-restaurant-form" style="display:none;">

                    <h5 class="mt-3 border-bottom pb-2">Identificazione</h5>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="legalName" class="form-label">Nome Legale</label>
                            <input type="text" class="form-control" id="legalName" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="displayName" class="form-label">Nome Commerciale (Mostrato ai clienti)</label>
                            <input type="text" class="form-control" id="displayName" required>
                        </div>
                    </div>

                    <h5 class="mt-3 border-bottom pb-2">Contatti</h5>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="phoneNumber" class="form-label">Telefono</label>
                            <input type="text" class="form-control" id="phoneNumber" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label">Email (Opzionale)</label>
                            <input type="email" class="form-control" id="email">
                        </div>
                    </div>

                    <h5 class="mt-3 border-bottom pb-2">Indirizzo</h5>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="street" class="form-label">Via</label>
                            <input type="text" class="form-control" id="street" required>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label for="number" class="form-label">Civico</label>
                            <input type="text" class="form-control" id="number" required>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label for="zip" class="form-label">CAP</label>
                            <input type="text" class="form-control" id="zip" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="city" class="form-label">Città</label>
                            <input type="text" class="form-control" id="city" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="province" class="form-label">Provincia</label>
                            <input type="text" class="form-control" id="province" required>
                        </div>
                    </div>

                    <h5 class="mt-3 border-bottom pb-2">Operativo e Online</h5>
                    <div class="mb-3">
                        <label for="openingHours" class="form-label">Orari di Apertura</label>
                        <input type="text" class="form-control" id="openingHours"
                            placeholder="Es: Lun-Dom 12:00 - 23:00" required>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Descrizione</label>
                        <textarea class="form-control" id="description" rows="3"></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="websiteUrl" class="form-label">Sito Web (URL)</label>
                        <input type="url" class="form-control" id="websiteUrl">
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Salva
                            Modifiche</button>
                    </div>
                </form>

                <div id="error-message" class="alert alert-danger mt-3" style="display:none;"></div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/edit-restaurant-info.js"></script>
</body>

</html>
