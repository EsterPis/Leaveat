<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <title>Completa profilo ristoratore</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">
  <nav class="navbar bg-light px-3">
  <a href="index.html" class="navbar-brand d-flex align-items-center">
      <i class="bi bi-house-fill fs-3"></i>
  </a>
</nav>

<div class="container py-4">
  <h1 class="mb-4">Completa il tuo profilo ristoratore</h1>

  <!-- Stepper semplice -->
  <ol class="breadcrumb">
    <li class="breadcrumb-item active" id="step1Crumb">1 - Dati fiscali</li>
    <li class="breadcrumb-item" id="step2Crumb">2 - Ristorante</li>
    <li class="breadcrumb-item" id="step3Crumb">3 - Menù</li>
  </ol>

  <!-- STEP 1 -->
  <section id="step1" class="card p-3 mb-3">
    <div class="mb-3">
      <label class="form-label">Partita IVA</label>
      <input id="vat" class="form-control" placeholder="IT12345678901">
    </div>
    <button class="btn btn-primary" id="toStep2">Prosegui</button>
  </section>

  <!-- STEP 2 -->
  <section id="step2" class="card p-3 mb-3 d-none">
    <div class="row g-3">
      <div class="col-md-4">
        <label class="form-label">Nome ristorante</label>
        <input id="name" class="form-control">
      </div>
      <div class="col-md-4">
        <label class="form-label">Telefono</label>
        <input id="phone" class="form-control">
      </div>
      <div class="col-md-4">
        <label class="form-label">Indirizzo</label>
        <input id="address" class="form-control">
      </div>
    </div>
    <div class="mt-3 d-flex gap-2">
      <button class="btn btn-secondary" id="back1">Indietro</button>
      <button class="btn btn-primary" id="toStep3">Prosegui</button>
    </div>
  </section>

  <!-- STEP 3 -->
  <section id="step3" class="card p-3 mb-3 d-none">
    <div class="mb-2">
      <label class="form-label">Come vuoi creare il menù?</label>
      <select id="menuMode" class="form-select">
        <option value="new">Nuovo (seleziona piatti dal catalogo)</option>
        <option value="import">Importa da un mio altro menù</option>
      </select>
    </div>

    <!-- Catalogo -->
    <div id="newMenuBox" class="mt-3">
      <p class="text-muted">Seleziona piatti dal catalogo</p>
      <div id="catalog" class="row g-2"></div>
    </div>

    <!-- Import -->
    <div id="importBox" class="mt-3 d-none">
      <label class="form-label">Scegli menù esistente</label>
      <select id="fromMenuId" class="form-select"></select>
    </div>

    <div class="mt-3 d-flex gap-2">
      <button class="btn btn-secondary" id="back2">Indietro</button>
      <button class="btn btn-success" id="finish">Completa</button>
    </div>
  </section>

  <div id="alert" class="alert d-none mt-3"></div>
</div>

<script src="/js/restaurateur.js"></script>
</body>
</html>
