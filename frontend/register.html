<!doctype html>
<html lang="it">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Leaveat • Registrazione</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body class="bg-light">
<!-- ================= NAVBAR ================= -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">

            <a class="navbar-brand" href="/index.html">Leaveat</a>

            <div class="d-flex align-items-center gap-3">

                <!-- Carrello -->
                <a href="/cart.html" class="btn btn-outline-light position-relative cart-button">
                    <i class="bi bi-cart3"></i>
                    <span id="cart-count"
                        class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                        0
                    </span>
                </a>
                <div class="ms-2 user-section"></div>

            </div>

        </div>
    </nav>
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm">
          <div class="card-body">
            <h1 class="h4 mb-3">Crea account</h1>
            <form id="regForm">
              <div class="mb-3">
                <label class="form-label">Nome</label>
                <input class="form-control" type="text" name="firstName" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Cognome</label>
                <input class="form-control" type="text" name="lastName" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input class="form-control" type="email" name="email" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Telefono</label>
                <input class="form-control" type="text" name="phoneNumber" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Password</label>
                <input class="form-control" type="password" name="password" required minlength="6">
              </div>
              <div class="mb-3">
                <label class="form-label">Ruolo</label>
                <select class="form-select" name="role">
                  <option value="CUSTOMER">Cliente</option>
                  <option value="RESTAURATEUR">Ristoratore</option>
                </select>
              </div>
              <button class="btn btn-success w-100">Registrati</button>
            </form>
            <div class="mt-3 small">Hai già un account? <a href="/login.html">Accedi</a></div>
            <div id="msg" class="mt-3"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="/js/auth.js"></script>
  <script src="/js/session.js"></script>
  <script>
    setupRegister();
  </script>
</body>

</html>
