<!doctype html>
<html lang="it">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Leaveat • Completa profilo cliente</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body class="bg-light">
  <nav class="navbar bg-light px-3">
    <a href="index.html" class="navbar-brand d-flex align-items-center">
      <i class="bi bi-house-fill fs-3"></i>
    </a>
  </nav>

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm">
          <div class="card-body">
            <h1 class="h4 mb-3">Completa il tuo profilo cliente</h1>

            <form id="customerForm">
              <!-- Categorie preferite -->
              <div class="mb-3">
                <label class="form-label">Categorie preferite</label>
                <div id="categoriesList" class="d-flex flex-wrap gap-2"></div>
                <div id="selectedCategories" class="mt-2"></div>
              </div>

              <!-- Ristoranti preferiti -->
              <div class="mb-3">
                <label class="form-label">Ristoranti preferiti</label>
                <div id="restaurantsList" class="d-flex flex-wrap gap-2"></div>
                <div id="selectedRestaurants" class="mt-2"></div>
              </div>


              <!-- Metodo di pagamento -->
              <div class="mb-3">
                <label class="form-label">Metodo di pagamento</label>
                <div>
                  <div class="form-check">
                    <input class="form-check-input" type="radio" name="paymentMethod" value="CASH" checked>
                    <label class="form-check-label">Contanti</label>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input" type="radio" name="paymentMethod" value="PREPAID_CARD">
                    <label class="form-check-label">Carta prepagata</label>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input" type="radio" name="paymentMethod" value="CREDIT_CARD">
                    <label class="form-check-label">Carta di credito</label>
                  </div>
                </div>
              </div>

              <button class="btn btn-success w-100" type="submit">Conferma profilo</button>
            </form>

            <div id="msg" class="mt-3"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/customer.js"></script>
</body>

</html>
