<!doctype html>
<html lang="it">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Leaveat • Carrello</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>
  <!--Dynamic navbar-->

  <!-- ================= CONTENUTO ================= -->
  <main class="container py-4">
    <h2 class="mb-4">Il tuo carrello</h2>
    <div id="cartContainer"></div>
    <div id="cartSummary" class="mt-4"></div>
  </main>


  <script>
    // ================= UTIL CARRELLO =================
    // Preleva il carrello dallo storage, o ritorna null se non esiste
    function getCart() {
      return JSON.parse(localStorage.getItem("cart")) || null;
    }

    // Salva il carrello nello storage e aggiorna il badge
    function saveCart(cart) {
      localStorage.setItem("cart", JSON.stringify(cart));
      updateCartBadge();
    }

    // Aggiorna il badge del carrello nella navbar
    function updateCartBadge() {
      const badge = document.getElementById("cart-count");
      const cart = getCart();

      if (!badge) return;
      if (!cart || !cart.items.length) {
        badge.textContent = 0;
        return;
      }

      const totalItems = cart.items.reduce((sum, item) => sum + item.quantity, 0); // conta elementi totali
      badge.textContent = totalItems;
    }

    // ================= RENDER CARRELLO =================
    // Renderizza il contenuto del carrello nella pagina
    function renderCart() {
      const cart = getCart();
      const container = document.getElementById("cartContainer");
      const summary = document.getElementById("cartSummary");

      container.innerHTML = "";
      summary.innerHTML = "";

      // messaggio carrello vuoto
      if (!cart || !cart.items.length) {
        container.innerHTML = `
          <div class="alert alert-info">
            Il carrello è vuoto.
          </div>
        `;
        return;
      }

      let total = 0;
      cart.items.forEach(item => {
        const itemTotal = item.price * item.quantity; // calcola totale per questo piatto
        total += itemTotal;

        // renderizza una riga per piatto
        const row = document.createElement("div");
        row.className = "card mb-3";
        row.innerHTML = `
          <div class="card-body d-flex justify-content-between align-items-center">
          <div>
            <h5 class="mb-1">${item.name}</h5>
            <small class="text-muted">€ ${item.price.toFixed(2)}</small>
          </div>
          <div class="d-flex align-items-center gap-2">
            <!-- pulsanti per modificare quantità e rimuovere -->
          <button class="btn btn-sm btn-outline-secondary"
                  onclick="changeQuantity('${item.dishId}', -1)">
            -
          </button>
          <span>${item.quantity}</span>
          <button class="btn btn-sm btn-outline-secondary"
                  onclick="changeQuantity('${item.dishId}', 1)">
            +
          </button>
          <button class="btn btn-sm btn-outline-danger"
                  onclick="removeItem('${item.dishId}')">
            <i class="bi bi-trash"></i>
          </button>
          </div>

        </div>
        `;

        container.appendChild(row);
      });

      summary.innerHTML = `
        <div class="card">
          <div class="card-body d-flex justify-content-between align-items-center">

            <h4>Totale: € ${total.toFixed(2)}</h4>

            <button class="btn btn-success"
                    onclick="confirmOrder()">
              Conferma Ordine
            </button>

          </div>
        </div>
      `;
    }

    // ================= MODIFICA QUANTITÀ =================
    // Modifica la quantità di un piatto nel carrello, o lo rimuove se la quantità scende a 0
    function changeQuantity(dishId, delta) {
      const cart = getCart();
      if (!cart) return;

      const item = cart.items.find(i => i.dishId === dishId);
      if (!item) return;

      item.quantity += delta;

      if (item.quantity <= 0) {
        cart.items = cart.items.filter(i => i.dishId !== dishId);
      }

      if (!cart.items.length) {
        localStorage.removeItem("cart");
        updateCartBadge();
        renderCart();
        return;
      }

      saveCart(cart);
      renderCart();
    }

    // Rimuove completamente un piatto dal carrello
    function removeItem(dishId) {
      const cart = getCart();
      if (!cart) return;

      cart.items = cart.items.filter(i => i.dishId !== dishId);
      if (!cart.items.length) {
        localStorage.removeItem("cart");
        updateCartBadge();
        renderCart();
        return;
      }

      saveCart(cart);
      renderCart();
    }

    // ================= CONFERMA ORDINE =================
    // Invia il carrello al backend per creare un nuovo ordine
    async function confirmOrder() {
      const token = localStorage.getItem("token");
      const role = localStorage.getItem("role");

      if (!token) {
        alert("Devi effettuare il login per confermare l'ordine.");
        window.location.href = "/login.html";
        return;
      }

      if (role !== "CUSTOMER") {
        alert("Solo i clienti possono effettuare ordini.");
        return;
      }

      const cart = getCart();
      if (!cart || !cart.items.length) return;

      try {
        //chiamata backend
        const response = await fetch("/api/lv/orders", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
          },
          body: JSON.stringify({
            restaurantId: cart.restaurantId,
            items: cart.items.map(i => ({
              dishId: i.dishId,
              quantity: i.quantity
            }))
          })
        });

        const result = await response.json();

        if (!response.ok) {
          throw new Error(result.message || "Errore creazione ordine");
        }

        // Tempo stimato e conferma ordine
        const ordersRes = await fetch("/api/lv/orders/my-orders", {
          headers: {
            "Authorization": "Bearer " + token
          }
        });

        const ordersData = await ordersRes.json();
        const latestOrder = ordersData.data[0];
        document.getElementById("estimatedTime").textContent = latestOrder.estimatedWaitTime || 0;
        localStorage.removeItem("cart"); // svuota carrello dopo conferma
        updateCartBadge();
        renderCart();

        const modal = new bootstrap.Modal(document.getElementById('orderSuccessModal'));
        modal.show();

      } catch (err) {
        console.error(err);
        alert("Errore durante la creazione dell'ordine.");
      }
    }

    // ================= INIT =================
    window.addEventListener("load", () => {
      updateCartBadge();
      renderCart();
    });
  </script>

  <!-- ================= MODALE CONFERMA ORDINE ================= -->
  <div class="modal fade" id="orderSuccessModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title">Ordine confermato 🎉</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body text-center">

          <p class="mb-2">Il tuo ordine è stato effettuato con successo!</p>

          <p class="fw-bold">
            ⏱ Tempo stimato:
            <span id="estimatedTime">--</span> minuti
          </p>

        </div>

        <div class="modal-footer">
          <a href="/orders.html" class="btn btn-primary">
            Vai ai tuoi ordini
          </a>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module"> import { renderNavbar } from '/js/utils/navbar.js'; renderNavbar() </script>
  <script src="/js/session.js"></script>

</body>

</html>
